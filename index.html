<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Premium Store | Locked Content</title>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // Firebase Storage not used - using imgbb instead

    const firebaseConfig = {
      apiKey: "AIzaSyAK07eK1ff1_lOpEHobz-ePGvyjBOr6K6A",
      authDomain: "istore-a2f82.firebaseapp.com",
      projectId: "istore-a2f82",
      storageBucket: "istore-a2f82.firebasestorage.app",
      messagingSenderId: "422338655302",
      appId: "1:422338655302:web:02eb223e02d3e9cbf94647",
      measurementId: "G-3ZRXKDE0BR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;

    window.getDoc = getDoc;
    window.doc = doc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.onSnapshot = onSnapshot;
    // imgbb is used for file uploads instead of Firebase Storage
  </script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow-x: hidden; font-family: 'Inter', -apple-system, sans-serif; }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes glow { 0%{box-shadow:0 0 0px rgba(192,132,252,0)} 50%{box-shadow:0 0 40px rgba(192,132,252,0.5)} 100%{box-shadow:0 0 0px rgba(192,132,252,0)} }
    @keyframes scaleIn { 0%{opacity:0;transform:scale(0.95)} 100%{opacity:1;transform:scale(1)} }
    @keyframes slideUp { 0%{opacity:0;transform:translateY(40px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes slideInRight { 0%{opacity:0;transform:translateX(100px)} 100%{opacity:1;transform:translateX(0)} }
    @keyframes fadeOut { 0%{opacity:1} 100%{opacity:0;transform:translateY(-10px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-scale { animation: scaleIn 0.4s ease-out; }
    .animate-slide { animation: slideUp 0.5s ease-out; }

    .card-hover { transition: all 0.3s cubic-bezier(0.2,0.95,0.4,1.1); }
    .card-hover:hover { transform: translateY(-5px); background: rgba(255,255,255,0.07); border-color: rgba(192,132,252,0.4); }

    .btn-effect { transition: all 0.2s ease; cursor: pointer; }
    .btn-effect:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .btn-effect:active { transform: translateY(1px); }

    .gradient-text { background: linear-gradient(135deg, #ffffff, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 16px 24px; border-radius: 14px; background: rgba(15,15,20,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 12px; animation: slideInRight 0.3s ease-out, fadeOut 0.3s ease-out 2.7s forwards; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    .toast.success { border-left: 4px solid #4ade80; }
    .toast.info { border-left: 4px solid #60a5fa; }
    .toast.warning { border-left: 4px solid #fbbf24; }
    .toast i { font-size: 18px; }
    .toast.success i { color: #4ade80; }
    .toast.info i { color: #60a5fa; }
    .toast.warning i { color: #fbbf24; }

    .locked-media { transition: filter 0.6s; }
    .unlocked-media { filter: blur(0px) brightness(1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ADMIN_CODE = "999";
    const STORE_DOC_ID = "store_config";

    const defaultData = {
      storeName: "My Store",
      profileImage: "",
      walletAddress: "TNyc69Srbjc2eTCJLq2fLHoaP1bH5BbNM2",
      productName: "Premium Pack",
      price: "29",
      currency: "USDT",
      bgColor: "#0a0a0f",
      accentColor: "#c084fc",
      description: "Exclusive premium content • Unlock after payment",
      contentItems: [],
      blurAmount: 18,
      socialLinks: { instagram: "", tiktok: "", twitter: "" },
      pendingOrders: [],
      packages: [
        { id: "pkg1", name: "Basic Pack", price: "10", currency: "USDT", description: "Starter package", contentItems: [], blurAmount: 18 },
        { id: "pkg2", name: "Premium Pack", price: "29", currency: "USDT", description: "Full access", contentItems: [], blurAmount: 18 }
      ],
      telegramBotToken: "8723072113:AAFbJHjIUg4gPwgTG3BziG5K7RPAFum-Jc4",
      telegramChatId: "7492731435",
    };

    // ── Firebase helpers ──────────────────────────────────────────────
    async function loadData() {
      const d = window.doc(window.db, "store", STORE_DOC_ID);
      const snap = await window.getDoc(d);
      if (snap.exists()) return { ...defaultData, ...snap.data() };
      await window.setDoc(d, defaultData);
      return defaultData;
    }

    async function saveData(data) {
      await window.setDoc(window.doc(window.db, "store", STORE_DOC_ID), data);
    }

    async function sendTelegramNotification(order, pkg) {
      try {
        const snap = await window.getDoc(window.doc(window.db, "store", STORE_DOC_ID));
        if (!snap.exists()) return;
        const d = snap.data();
        const token = d.telegramBotToken || "";
        const chatId = d.telegramChatId || "";
        if (!token || !chatId) return;
        const msg = `NEW ORDER\n\nPackage: ${pkg.name}\nPrice: ${pkg.price} ${pkg.currency}\nOrder ID: ${order.id}\nTime: ${new Date().toLocaleString()}\n\nApprove from Admin Panel.`;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chatId, text: msg })
        });
      } catch(e) { console.log("Telegram error:", e); }
    }

    async function updateOrderStatus(id, status) {
      const snap = await window.getDoc(window.doc(window.db, "store", STORE_DOC_ID));
      if (snap.exists()) {
        const cur = snap.data();
        const orders = (cur.pendingOrders || []).map(o => o.id === id ? { ...o, status } : o);
        await window.updateDoc(window.doc(window.db, "store", STORE_DOC_ID), { pendingOrders: orders });
      }
    }

    // ── imgbb Upload helper ───────────────────────────────────────────
    const IMGBB_KEY = "f0d88140e3809581992870b4e4ea41f5";

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append("image", file);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: "POST",
        body: formData
      });
      const json = await res.json();
      if (!json.success) throw new Error("imgbb upload failed");
      return json.data.url;
    }

    // imgbb doesn't support delete via API - just remove from list
    async function deleteFileByUrl(url) {
      // imgbb free plan has no delete API, image removed from UI only
      console.log("Image removed from store (imgbb free plan - no server delete)");
    }

    // ── QR Code ───────────────────────────────────────────────────────
    function QRCode({ value, size = 140 }) {
      return (
        <div className="animate-glow" style={{ width: size, height: size, background: "white", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: 10 }}>
          <img
            src={`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`}
            alt="QR"
            style={{ width: "100%", height: "100%", borderRadius: 10 }}
          />
        </div>
      );
    }

    // ── Toast ─────────────────────────────────────────────────────────
    function Toast({ message, type, onClose }) {
      const [closing, setClosing] = useState(false);
      useEffect(() => {
        const t = setTimeout(() => { setClosing(true); setTimeout(onClose, 300); }, 3000);
        return () => clearTimeout(t);
      }, [onClose]);
      const icon = type === "success" ? "✓" : type === "info" ? "ℹ" : "⚡";
      return (
        <div className={`toast ${type}`} style={closing ? { animation: "fadeOut 0.3s ease-out forwards" } : {}}>
          <i>{icon}</i>
          <span>{message}</span>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState("store");
      const [data, setData] = useState(defaultData);
      const [loading, setLoading] = useState(true);
      const [adminCode, setAdminCode] = useState("");
      const [adminAuth, setAdminAuth] = useState(false);
      const [adminError, setAdminError] = useState("");
      const [editData, setEditData] = useState(null);
      const [orderId, setOrderId] = useState(null);
      const [selectedPkg, setSelectedPkg] = useState(null);
      const [approved, setApproved] = useState(false);
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [saveMsg, setSaveMsg] = useState("");
      const [toasts, setToasts] = useState([]);

      const tapCount = useRef(0);
      const tapTimer = useRef(null);
      const prevOrdersLength = useRef(0);
      const orderIdRef = useRef(null);
      const approvedRef = useRef(false);

      // keep refs in sync so the snapshot closure sees latest values
      useEffect(() => { orderIdRef.current = orderId; }, [orderId]);
      useEffect(() => { approvedRef.current = approved; }, [approved]);

      const addToast = useCallback((msg, type = "info") =>
        setToasts(p => [...p, { id: Date.now() + Math.random(), message: msg, type }]), []);
      const removeToast = useCallback((id) =>
        setToasts(p => p.filter(t => t.id !== id)), []);

      // Request browser notification permission once
      useEffect(() => {
        if (window.Notification &&
          Notification.permission !== "granted" &&
          Notification.permission !== "denied") {
          Notification.requestPermission();
        }
      }, []);

      const showBrowserNotification = (title, body) => {
        if (window.Notification && Notification.permission === "granted")
          new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/1170/1170679.png" });
      };

      // Load data + real-time listener
      useEffect(() => {
        let unsub = null;
        (async () => {
          setLoading(true);
          const d = await loadData();
          setData(d);
          prevOrdersLength.current = (d.pendingOrders || []).length;
          setLoading(false);

          unsub = window.onSnapshot(window.doc(window.db, "store", STORE_DOC_ID), (snap) => {
            if (!snap.exists()) return;
            const nd = { ...defaultData, ...snap.data() };
            const newLen = (nd.pendingOrders || []).length;

            if (newLen > prevOrdersLength.current) {
              addToast("New order received!", "info");
              showBrowserNotification("New Order", "A new purchase order has been placed.");
            }

            // Check if current user's order was approved
            if (orderIdRef.current && !approvedRef.current) {
              const ord = (nd.pendingOrders || []).find(o => o.id === orderIdRef.current);
              if (ord?.status === "approved") {
                approvedRef.current = true;
                setApproved(true);
                addToast("Payment approved! Redirecting...", "success");
                showBrowserNotification("Approved", "Your payment has been confirmed.");
                setTimeout(() => setPage("success"), 1500);
              }
            }

            prevOrdersLength.current = newLen;
            setData(nd);
          });
        })();
        return () => { if (unsub) unsub(); };
      }, []); // run once

      function handleLogoTap() {
        tapCount.current++;
        clearTimeout(tapTimer.current);
        tapTimer.current = setTimeout(() => { tapCount.current = 0; }, 800);
        if (tapCount.current >= 3) { setShowAdminModal(true); tapCount.current = 0; }
      }

      function adminLogin() {
        if (adminCode === ADMIN_CODE) {
          setAdminAuth(true);
          setEditData(JSON.parse(JSON.stringify(data)));
          setPage("admin");
          setShowAdminModal(false);
          setAdminError("");
          setAdminCode("");
        } else {
          setAdminError("Invalid code");
        }
      }

      async function saveAdminChanges() {
        try {
          await saveData(editData);
          setData(editData);
          setSaveMsg("✓ Saved");
          addToast("Changes saved", "success");
          setTimeout(() => setSaveMsg(""), 2000);
        } catch (e) {
          addToast("Save failed: " + e.message, "warning");
        }
      }

      async function handleBuy(pkg) {
        const id = "ORD-" + Date.now();
        setOrderId(id);
        setSelectedPkg(pkg);
        const order = { id, status: "pending", time: new Date().toISOString(), packageId: pkg.id, packageName: pkg.name, price: pkg.price, currency: pkg.currency };
        const updated = { ...data, pendingOrders: [...(data.pendingOrders || []), order] };
        await saveData(updated);
        setData(updated);
        await sendTelegramNotification(order, pkg);
        setPage("payment");
        addToast("Order created! Waiting for payment...", "info");
      }

      async function approveOrder(id) {
        await updateOrderStatus(id, "approved");
        addToast("Order " + id + " approved", "success");
        const updated = {
          ...data,
          pendingOrders: data.pendingOrders.map(o => o.id === id ? { ...o, status: "approved" } : o)
        };
        setData(updated);
        if (editData) setEditData(updated);
      }

      // Upload to imgbb then save immediately
      async function handleFileUpload(file) {
        const url = await uploadFile(file);
        const newItem = { url, type: "image", filename: file.name };
        setEditData(prev => {
          const updated = { ...prev, contentItems: [...(prev.contentItems || []), newItem] };
          saveData({ ...data, contentItems: [...(data.contentItems || []), newItem] });
          return updated;
        });
        addToast(`${file.name} uploaded!`, "success");
      }

      const accent = data.accentColor || "#c084fc";
      const bg = data.bgColor || "#0a0a0f";

      const styles = {
        app: { minHeight: "100vh", background: bg, color: "white", position: "relative", overflow: "hidden" },
        orb: (x, y, c = accent) => ({
          position: "fixed", width: 500, height: 500, borderRadius: "50%",
          background: `radial-gradient(circle, ${c}30, transparent)`,
          filter: "blur(100px)", opacity: 0.4, top: y, left: x, pointerEvents: "none", zIndex: 0
        }),
        content: { position: "relative", zIndex: 1, maxWidth: 500, margin: "0 auto", padding: "0 20px 80px" },
        card: {
          background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
          borderRadius: 28, padding: 28, marginBottom: 20, backdropFilter: "blur(20px)"
        },
        sectionTitle: { fontSize: 11, fontWeight: 700, letterSpacing: 4, textTransform: "uppercase", opacity: 0.45, marginBottom: 18 },
        buyBtn: {
          width: "100%", padding: "18px 0",
          background: `linear-gradient(135deg, ${accent}, ${accent}aa)`,
          border: "none", borderRadius: 40, color: "white", fontSize: 17,
          fontWeight: 700, cursor: "pointer", letterSpacing: 1, marginTop: 24, transition: "all 0.2s"
        },
        input: {
          width: "100%", background: "rgba(255,255,255,0.05)",
          border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14,
          padding: "12px 16px", color: "white", fontSize: 14, outline: "none", marginBottom: 14
        }
      };

      // ── Loading ───────────────────────────────────────────────────
      if (loading) {
        return (
          <div style={{ ...styles.app, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div className="animate-float" style={{ fontSize: 18, opacity: 0.6 }}>Loading...</div>
          </div>
        );
      }

      // ── Payment Page ──────────────────────────────────────────────
      if (page === "payment") {
        return (
          <div style={styles.app}>
            <div style={styles.orb("60%", "-20%")} />
            <div style={styles.orb("-20%", "60%")} />
            <div style={styles.content} className="animate-slide">
              <div style={{ paddingTop: 40, textAlign: "center" }}>
                <button
                  onClick={() => setPage("store")}
                  style={{ background: "none", border: "none", color: "white", opacity: 0.5, cursor: "pointer", fontSize: 14, marginBottom: 32, display: "flex", alignItems: "center", gap: 6 }}
                >← Back</button>
                <div style={{ fontSize: 12, opacity: 0.5, letterSpacing: 4, textTransform: "uppercase", marginBottom: 12 }}>complete payment</div>
                <div style={{ fontSize: 44, fontWeight: 900, marginBottom: 6, letterSpacing: -1 }}>{selectedPkg ? selectedPkg.price : data.price} {selectedPkg ? selectedPkg.currency : data.currency}</div>
                <div style={{ fontSize: 13, opacity: 0.4, marginBottom: 32 }}>{selectedPkg ? selectedPkg.name : data.productName}</div>

                <div className="card-hover" style={styles.card}>
                  <div style={styles.sectionTitle}>wallet address</div>
                  <div style={{ background: "rgba(0,0,0,0.4)", borderRadius: 14, padding: "12px 16px", fontSize: 12, fontFamily: "monospace", wordBreak: "break-all", marginBottom: 8, border: "1px solid rgba(255,255,255,0.08)", color: accent }}>
                    {data.walletAddress}
                  </div>
                  <p style={{ fontSize: 12, opacity: 0.5, marginBottom: 20, lineHeight: 1.5 }}>
                    Send exactly <strong>{data.price} {data.currency}</strong>. Your order will be approved after confirmation.
                  </p>
                  <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
                    <QRCode value={data.walletAddress} size={160} />
                  </div>
                  <div style={{ background: `${accent}10`, border: `1px solid ${accent}25`, borderRadius: 14, padding: "14px 16px", fontSize: 13, textAlign: "center", lineHeight: 1.6 }}>
                    After sending, wait for admin approval.<br />
                    <span style={{ opacity: 0.5 }}>Content will be unlocked automatically.</span>
                  </div>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 12, justifyContent: "center", marginTop: 16 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: approved ? "#4ade80" : "#fbbf24", boxShadow: `0 0 10px ${approved ? "#4ade80" : "#fbbf24"}`, animation: "pulse 1.5s infinite" }} />
                  <span style={{ fontSize: 13, opacity: 0.7 }}>
                    {approved ? "Approved!" : `Waiting for approval... (${orderId})`}
                  </span>
                </div>
              </div>
            </div>
            <div className="toast-container">{toasts.map(t => <Toast key={t.id} {...t} onClose={() => removeToast(t.id)} />)}</div>
          </div>
        );
      }

      // ── Success Page ──────────────────────────────────────────────
      if (page === "success") {
        const items = selectedPkg ? (selectedPkg.contentItems || []) : (data.contentItems || []);
        return (
          <div style={styles.app}>
            <div style={styles.orb("50%", "50%", "#4ade80")} />
            <div style={styles.content} className="animate-scale">
              <div style={{ paddingTop: 80, textAlign: "center" }}>
                <div className="animate-float" style={{ fontSize: 72, marginBottom: 20 }}>✓</div>
                <div className="gradient-text" style={{ fontSize: 34, fontWeight: 900, marginBottom: 12 }}>Purchase Complete!</div>
                <div style={{ fontSize: 15, opacity: 0.5, marginBottom: 48 }}>Thank you for your purchase.</div>

                {items.length > 0 && (
                  <div className="card-hover" style={styles.card}>
                    <div style={styles.sectionTitle}>your content</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                      {items.map((item, i) => (
                        <div key={i} style={{ borderRadius: 16, overflow: "hidden" }}>
                          {item.type === "video"
                            ? <video src={item.url} controls style={{ width: "100%", aspectRatio: "16/9", objectFit: "cover" }} />
                            : <img src={item.url} alt="" style={{ width: "100%", aspectRatio: "3/4", objectFit: "cover" }} />
                          }
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <button
                  onClick={() => { setPage("store"); setApproved(false); setOrderId(null); }}
                  className="btn-effect"
                  style={{ ...styles.buyBtn, background: "rgba(255,255,255,0.08)", boxShadow: "none", marginTop: 24 }}
                >Return to Store</button>
              </div>
            </div>
            <div className="toast-container">{toasts.map(t => <Toast key={t.id} {...t} onClose={() => removeToast(t.id)} />)}</div>
          </div>
        );
      }

      // ── Admin Panel ───────────────────────────────────────────────
      if (page === "admin" && adminAuth) {
        const ed = editData || data;
        return (
          <div style={{ ...styles.app, background: "#050508" }}>
            <div style={{ ...styles.content, paddingTop: 24 }}>
              {/* Header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
                <div style={{ fontSize: 22, fontWeight: 800 }}>Admin Panel</div>
                <button onClick={() => setPage("store")} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "white", borderRadius: 12, padding: "8px 16px", cursor: "pointer", fontSize: 13 }}>Exit</button>
              </div>

              {/* Profile */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Profile</div>
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Store Name</label>
                <input value={ed.storeName} onChange={e => setEditData({ ...ed, storeName: e.target.value })} style={styles.input} />
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Profile Image URL</label>
                <input value={ed.profileImage} onChange={e => setEditData({ ...ed, profileImage: e.target.value })} placeholder="https://..." style={styles.input} />
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Or Upload Profile Image</label>
                <input type="file" accept="image/*" onChange={async (e) => {
                  const file = e.target.files[0];
                  if (file) {
                    addToast("Uploading profile image...", "info");
                    try {
                      const url = await uploadFile(file);
                      setEditData(prev => ({ ...prev, profileImage: url }));
                      await saveData({ ...data, profileImage: url });
                      addToast("Profile image uploaded!", "success");
                    } catch (err) {
                      addToast("Upload failed: " + err.message, "warning");
                    }
                  }
                }} style={{ ...styles.input, padding: "8px 16px" }} />
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Wallet Address</label>
                <input value={ed.walletAddress} onChange={e => setEditData({ ...ed, walletAddress: e.target.value })} style={styles.input} />
              </div>

              {/* Product Settings */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Product Settings</div>
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Product Name</label>
                <input value={ed.productName} onChange={e => setEditData({ ...ed, productName: e.target.value })} style={styles.input} />
                <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Description</label>
                <textarea value={ed.description} onChange={e => setEditData({ ...ed, description: e.target.value })} style={{ ...styles.input, minHeight: 80, resize: "vertical" }} />
                <div style={{ display: "flex", gap: 14 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Price</label>
                    <input value={ed.price} onChange={e => setEditData({ ...ed, price: e.target.value })} style={styles.input} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Currency</label>
                    <input value={ed.currency} onChange={e => setEditData({ ...ed, currency: e.target.value })} style={styles.input} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 14 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Background Color</label>
                    <input type="color" value={ed.bgColor} onChange={e => setEditData({ ...ed, bgColor: e.target.value })} style={{ ...styles.input, padding: "6px 16px", height: 44 }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block" }}>Accent Color</label>
                    <input type="color" value={ed.accentColor} onChange={e => setEditData({ ...ed, accentColor: e.target.value })} style={{ ...styles.input, padding: "6px 16px", height: 44 }} />
                  </div>
                </div>
              </div>

              {/* Packages Manager */}
              <div className="card-hover" style={styles.card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={styles.sectionTitle}>Packages ({(ed.packages || []).length})</div>
                  <button onClick={() => {
                    const newPkg = { id: "pkg_" + Date.now(), name: "New Pack", price: "10", currency: "USDT", description: "", contentItems: [], blurAmount: 18 };
                    setEditData({ ...ed, packages: [...(ed.packages || []), newPkg] });
                  }} style={{ background: accent + "22", border: `1px solid ${accent}44`, color: accent, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    + Add Package
                  </button>
                </div>

                {(ed.packages || []).map((pkg, pi) => (
                  <div key={pkg.id} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                    {/* Package header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                      <span style={{ fontWeight: 700, fontSize: 14 }}>Package {pi + 1}</span>
                      <button onClick={() => {
                        const arr = (ed.packages || []).filter((_, i) => i !== pi);
                        setEditData({ ...ed, packages: arr });
                      }} style={{ background: "none", border: "1px solid rgba(255,255,255,0.15)", color: "#f87171", borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontSize: 12 }}>Delete</button>
                    </div>

                    {/* Name + Description */}
                    <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Name</label>
                    <input value={pkg.name} onChange={e => {
                      const arr = [...(ed.packages || [])];
                      arr[pi] = { ...arr[pi], name: e.target.value };
                      setEditData({ ...ed, packages: arr });
                    }} style={{ ...styles.input, marginBottom: 10 }} />

                    <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Description</label>
                    <input value={pkg.description} onChange={e => {
                      const arr = [...(ed.packages || [])];
                      arr[pi] = { ...arr[pi], description: e.target.value };
                      setEditData({ ...ed, packages: arr });
                    }} style={{ ...styles.input, marginBottom: 10 }} />

                    {/* Price + Currency */}
                    <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Price</label>
                        <input value={pkg.price} onChange={e => {
                          const arr = [...(ed.packages || [])];
                          arr[pi] = { ...arr[pi], price: e.target.value };
                          setEditData({ ...ed, packages: arr });
                        }} style={styles.input} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Currency</label>
                        <input value={pkg.currency} onChange={e => {
                          const arr = [...(ed.packages || [])];
                          arr[pi] = { ...arr[pi], currency: e.target.value };
                          setEditData({ ...ed, packages: arr });
                        }} style={styles.input} />
                      </div>
                    </div>

                    {/* Blur slider */}
                    <label style={{ fontSize: 11, opacity: 0.5, display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span>Blur</span><span style={{ color: accent, fontWeight: 700 }}>{pkg.blurAmount || 18}px</span>
                    </label>
                    <input type="range" min="0" max="40" value={pkg.blurAmount || 18} onChange={e => {
                      const arr = [...(ed.packages || [])];
                      arr[pi] = { ...arr[pi], blurAmount: Number(e.target.value) };
                      setEditData({ ...ed, packages: arr });
                    }} style={{ width: "100%", accentColor: accent, cursor: "pointer", marginBottom: 12 }} />

                    {/* Images grid */}
                    {(pkg.contentItems || []).length > 0 && (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 10 }}>
                        {(pkg.contentItems || []).map((item, ii) => (
                          <div key={ii} style={{ position: "relative", borderRadius: 8, overflow: "hidden", aspectRatio: "3/4", background: "#000" }}>
                            <img src={item.url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.85 }} />
                            <button onClick={() => {
                              const arr = [...(ed.packages || [])];
                              arr[pi] = { ...arr[pi], contentItems: arr[pi].contentItems.filter((_, idx) => idx !== ii) };
                              setEditData({ ...ed, packages: arr });
                            }} style={{ position: "absolute", top: 4, right: 4, background: "rgba(0,0,0,0.8)", border: "none", color: "#f87171", borderRadius: 5, width: 22, height: 22, cursor: "pointer", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>x</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Upload for this package */}
                    <input type="file" accept="image/*" multiple onChange={async (e) => {
                      const files = Array.from(e.target.files);
                      if (!files.length) return;
                      addToast(`Uploading ${files.length} image(s)...`, "info");
                      try {
                        const newItems = [];
                        for (const file of files) {
                          const url = await uploadFile(file);
                          newItems.push({ url, type: "image", filename: file.name });
                        }
                        const arr = [...(ed.packages || [])];
                        arr[pi] = { ...arr[pi], contentItems: [...(arr[pi].contentItems || []), ...newItems] };
                        const updatedEd = { ...ed, packages: arr };
                        setEditData(updatedEd);
                        await saveData({ ...data, packages: arr });
                        addToast("Uploaded!", "success");
                      } catch(err) { addToast("Upload failed: " + err.message, "warning"); }
                      e.target.value = "";
                    }} style={{ ...styles.input, padding: "8px 14px", cursor: "pointer", fontSize: 12 }} />
                  </div>
                ))}
              </div>

              {/* Telegram Settings */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Telegram Notifications</div>
                <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Bot Token</label>
                <input value={ed.telegramBotToken || ""} onChange={e => setEditData({ ...ed, telegramBotToken: e.target.value })} style={{ ...styles.input, marginBottom: 10 }} placeholder="123456:ABC..." />
                <label style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 5 }}>Your Chat ID</label>
                <input value={ed.telegramChatId || ""} onChange={e => setEditData({ ...ed, telegramChatId: e.target.value })} style={styles.input} placeholder="Your Telegram user ID" />
              </div>

              {/* OLD Locked Content - hidden now */}
              <div style={{ display: "none" }}>
              {/* Locked Content */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Locked Content ({(ed.contentItems || []).length} items)</div>
                <div style={{ fontSize: 12, opacity: 0.5, marginBottom: 14 }}>Upload images. They appear blurred until purchase.</div>

                {/* Blur slider */}
                <div style={{ marginBottom: 16 }}>
                  <label style={{ fontSize: 12, opacity: 0.6, display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span>Blur Amount</span>
                    <span style={{ color: ed.accentColor || "#c084fc", fontWeight: 700 }}>{ed.blurAmount || 18}px</span>
                  </label>
                  <input type="range" min="0" max="40" value={ed.blurAmount || 18}
                    onChange={e => setEditData({ ...ed, blurAmount: Number(e.target.value) })}
                    style={{ width: "100%", accentColor: ed.accentColor || "#c084fc", cursor: "pointer" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, opacity: 0.3, marginTop: 3 }}>
                    <span>Clear</span><span>Max blur</span>
                  </div>
                </div>

                {/* Grid preview of uploaded images */}
                {(ed.contentItems || []).length > 0 && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
                    {(ed.contentItems || []).map((item, i) => (
                      <div key={i} style={{ position: "relative", borderRadius: 10, overflow: "hidden", background: "#000", aspectRatio: "3/4" }}>
                        <img src={item.url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.85 }} />
                        <button onClick={() => {
                          const arr = [...(ed.contentItems || [])];
                          arr.splice(i, 1);
                          deleteFileByUrl(item.url);
                          setEditData({ ...ed, contentItems: arr });
                        }} style={{
                          position: "absolute", top: 5, right: 5,
                          background: "rgba(0,0,0,0.75)", border: "none",
                          color: "#f87171", borderRadius: 6,
                          width: 26, height: 26, cursor: "pointer",
                          fontSize: 13, fontWeight: 700,
                          display: "flex", alignItems: "center", justifyContent: "center"
                        }}>x</button>
                      </div>
                    ))}
                  </div>
                )}

                <input type="file" accept="image/*" multiple style={{ ...styles.input, padding: "10px 16px", cursor: "pointer" }} />
              </div></div>

              {/* Social Links */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Social Links</div>
                {["instagram", "tiktok", "twitter"].map(platform => (
                  <React.Fragment key={platform}>
                    <label style={{ fontSize: 12, opacity: 0.6, marginBottom: 6, display: "block", textTransform: "capitalize" }}>{platform}</label>
                    <input
                      value={ed.socialLinks?.[platform] || ""}
                      onChange={e => setEditData({ ...ed, socialLinks: { ...ed.socialLinks, [platform]: e.target.value } })}
                      placeholder={`https://${platform}.com/...`}
                      style={styles.input}
                    />
                  </React.Fragment>
                ))}
              </div>

              {/* Orders */}
              <div className="card-hover" style={styles.card}>
                <div style={styles.sectionTitle}>Orders ({(ed.pendingOrders || []).filter(o => o.status === "pending").length} pending)</div>
                {(ed.pendingOrders || []).length === 0
                  ? <p style={{ opacity: 0.4, fontSize: 14 }}>No orders yet</p>
                  : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {[...(ed.pendingOrders || [])].reverse().map(order => (
                        <div key={order.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "12px 16px", border: "1px solid rgba(255,255,255,0.06)" }}>
                          <div>
                            <div style={{ fontSize: 12, fontWeight: 700 }}>{order.id}</div>
                            <div style={{ fontSize: 11, opacity: 0.4, marginTop: 2 }}>{order.time?.slice(0, 19)}</div>
                            <div style={{ fontSize: 11, marginTop: 2, color: order.status === "approved" ? "#4ade80" : "#fbbf24", fontWeight: 600 }}>{order.status.toUpperCase()}</div>
                          </div>
                          {order.status === "pending"
                            ? <button onClick={() => approveOrder(order.id)} style={{ background: accent, border: "none", color: "white", borderRadius: 10, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Approve</button>
                            : <span style={{ fontSize: 11, opacity: 0.4 }}>Done</span>
                          }
                        </div>
                      ))}
                    </div>
                  )
                }
              </div>

              {/* Save */}
              <button onClick={saveAdminChanges} className="btn-effect" style={{ ...styles.buyBtn, background: `linear-gradient(135deg, ${accent}, ${accent}aa)`, marginTop: 12 }}>
                Save Changes
              </button>
              {saveMsg && <div style={{ textAlign: "center", marginTop: 10, fontSize: 13, fontWeight: 600, color: saveMsg.includes("✓") ? "#4ade80" : "#f87171" }}>{saveMsg}</div>}
            </div>
            <div className="toast-container">{toasts.map(t => <Toast key={t.id} {...t} onClose={() => removeToast(t.id)} />)}</div>
          </div>
        );
      }

      // ── Main Store Page ───────────────────────────────────────────
      const socialEntries = Object.entries(data.socialLinks || {}).filter(([, link]) => !!link);

      return (
        <div style={styles.app}>
          <div style={styles.orb("20%", "-10%")} />
          <div style={styles.orb("80%", "60%", "#818cf8")} />

          {/* ⋯ Admin Button - top right */}
          <button
            onClick={() => setShowAdminModal(true)}
            style={{
              position: "fixed", top: 18, right: 18, zIndex: 100,
              background: "rgba(255,255,255,0.07)",
              border: "1px solid rgba(255,255,255,0.12)",
              borderRadius: 12, color: "white", fontSize: 22,
              width: 44, height: 44, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              letterSpacing: 1, backdropFilter: "blur(10px)"
            }}
          >⋯</button>

          <div style={styles.content} className="animate-scale">
            {/* Profile Header */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 30, marginBottom: 30 }}>
              <div style={{ marginBottom: 8 }}>
                {data.profileImage
                  ? <img src={data.profileImage} alt="Profile" style={{ width: 90, height: 90, borderRadius: "50%", objectFit: "cover", border: "3px solid rgba(255,255,255,0.2)" }} />
                  : <div style={{ width: 90, height: 90, borderRadius: "50%", background: "linear-gradient(135deg, #c084fc, #818cf8)", display: "flex", alignItems: "center", justifyContent: "center" }}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" opacity="0.6"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
                }
              </div>
              {data.storeName && <div style={{ fontSize: 20, fontWeight: 700, marginTop: 8 }}>{data.storeName}</div>}

              {/* Fix: social links rendered properly without spread */}
              {socialEntries.length > 0 && (
                <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
                  {socialEntries.map(([platform, link]) => (
                    <a
                      key={platform}
                      href={link.startsWith("http") ? link : `https://${link}`}
                      target="_blank"
                      rel="noreferrer"
                      style={{ color: "white", opacity: 0.5, textDecoration: "none", fontSize: 18 }}
                    >
                      {platform === "instagram" ? "IG" : platform === "tiktok" ? "TT" : "X"}
                    </a>
                  ))}
                </div>
              )}
            </div>

            {/* Multi-package cards */}
            {(data.packages || []).map((pkg) => (
              <div key={pkg.id} className="card-hover" style={{ ...styles.card, padding: 0, overflow: "hidden" }}>
                {/* Images */}
                {(pkg.contentItems || []).length > 0
                  ? (
                    <div style={{ display: "flex", flexDirection: "column" }}>
                      {(pkg.contentItems || []).map((item, i) => (
                        <div key={i} style={{ position: "relative", background: "#000" }}>
                          <img src={item.url} alt="" style={{ width: "100%", aspectRatio: "3/4", objectFit: "cover", display: "block", filter: `blur(${pkg.blurAmount || 18}px) brightness(0.45)`, transform: "scale(1.05)" }} />
                          <div style={{ position: "absolute", bottom: 20, left: 0, right: 0, display: "flex", justifyContent: "center" }}>
                            <div style={{ background: "rgba(0,0,0,0.65)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 14, padding: "10px 28px", display: "flex", alignItems: "baseline", gap: 5 }}>
                              <span style={{ fontSize: 30, fontWeight: 900, letterSpacing: -1 }}>{pkg.price}</span>
                              <span style={{ fontSize: 14, opacity: 0.5, fontWeight: 600 }}>{pkg.currency}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )
                  : <div style={{ aspectRatio: "3/4", background: "rgba(255,255,255,0.03)", display: "flex", alignItems: "center", justifyContent: "center", opacity: 0.3, fontSize: 13 }}>No images</div>
                }
                {/* Package info + buy */}
                <div style={{ padding: "20px 20px 22px" }}>
                  <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{pkg.name}</div>
                  <div style={{ fontSize: 13, opacity: 0.45, marginBottom: 18 }}>{pkg.description}</div>
                  <button onClick={() => handleBuy(pkg)} className="btn-effect animate-glow" style={styles.buyBtn}>
                    Buy Now
                  </button>
                </div>
              </div>
            ))}
          </div>

          <div className="toast-container">{toasts.map(t => <Toast key={t.id} {...t} onClose={() => removeToast(t.id)} />)}</div>

          {/* Admin Login Modal */}
          {showAdminModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
              <div style={{ background: "#111", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 24, padding: 32, width: 340, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>🔐 Admin Access</div>
                <div style={{ fontSize: 12, opacity: 0.4, marginBottom: 20 }}>Enter the secret code to continue</div>
                <input
                  type="password"
                  placeholder="Code"
                  value={adminCode}
                  onChange={e => setAdminCode(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && adminLogin()}
                  style={{ ...styles.input, textAlign: "center", fontSize: 18, letterSpacing: 4 }}
                />
                {adminError && <div style={{ color: "#f87171", fontSize: 13, marginBottom: 12 }}>{adminError}</div>}
                <button onClick={adminLogin} style={{ ...styles.buyBtn, marginTop: 0, marginBottom: 12 }}>Enter</button>
                <button onClick={() => { setShowAdminModal(false); setAdminError(""); setAdminCode(""); }} style={{ background: "none", border: "none", color: "white", opacity: 0.4, cursor: "pointer", fontSize: 13, width: "100%" }}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Fix: use createRoot (React 18) instead of legacy ReactDOM.render ──
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
